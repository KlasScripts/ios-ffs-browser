name: Build Windows EXE

on:
  push:
    branches:
      - main        # ← add this temporarily to test
    tags:
      - 'v*'

permissions:
  contents: write     # needed to create releases and upload assets

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'   # pin — PySide6 wheels are well-tested here

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PySide6 msgpack pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller ios_ffs_browser.spec

      - name: Zip the dist folder
        run: |
          Compress-Archive -Path dist\ios-ffs-browser\* -DestinationPath ios-ffs-browser-windows.zip

      - name: Create GitHub Release and upload asset
        uses: softprops/action-gh-release@v2
        with:
          files: ios-ffs-browser-windows.zip
          generate_release_notes: true   # auto-generates changelog from commits
